# Qingzhou Agent Configuration
# This file is loaded from the path specified by -javaagent argument or qingzhou.agent.config system property.

# HTTP Server (embedded, no Netty dependency)
qingzhou.agent.port=8080
qingzhou.agent.host=0.0.0.0

# Directory containing app JARs and QZ-INF/annotation.json files
qingzhou.agent.apps.dir=./apps

# Instance data directory (temp files, etc.)
qingzhou.agent.instance.dir=./instance

# Registry (management center) URL
qingzhou.agent.registry.url=http://localhost:8088

# RSA public key for registration encryption
qingzhou.agent.registry.publicKey=

# Heartbeat interval in seconds
qingzhou.agent.heartbeat.interval=60