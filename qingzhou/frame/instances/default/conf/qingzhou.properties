# jvm args
jvm.arg=-Dqingzhou.osgi.packages.extra=com.sun.management,sun.misc \
  -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=0.0.0.0:7979 \
  -server -Xms128m -Xmx512m \
  -XX:+UseParallelGC \
  -Dqingzhou.features.disabled=qingzhou-agent,qingzhou-jdbc

# app
#app~qingzhou-admin-app.code=admin

# http
qingzhou-http-server.port=7900

# registry
qingzhou-registry.private_
qingzhou-registry.interval=60
qingzhou-registry.timeout=120

# agent
qingzhou-agent.url=http://127.0.0.1:7900
qingzhou-agent.public_key=MIGfMA0GCSqGSIb3DQEBAQUAA4GNADCBiQKBgQCvGz/zSKrxml7Jb+luiAUfzGvECIsajOJITf/xBY/qUvBuHnlWRTQncIskxq02S6rHGdBy8k3MX2Lp91o93g58VzdkCGOGY69slEvqvGsJgxiH52npGWQU7LhoZwpAmTIR0o0MwOaot5ytMvFS7ZnQjuDM9RoGz7P3blopCHBWfwIDAQAB
qingzhou-agent.interval=60

# logger
qingzhou-logger.writingthread=true
qingzhou-logger.writer_console=console
qingzhou-logger.writer_console.level=info
qingzhou-logger.writer_console.format={date} [{level}] {message}
qingzhou-logger.writer_file=rolling file
qingzhou-logger.writer_file.file=logs/server_{date:yyyy-MM-dd}_{count}.log
qingzhou-logger.writer_file.level=info
qingzhou-logger.writer_file.format={date} [{level}] {message}
qingzhou-logger.writer_file.policies=size: 50MB,daily
qingzhou-logger.writer_file.backups=50
qingzhou-logger.writer_file.latest=logs/server.log
qingzhou-logger.writer_file.buffered=true
qingzhou-logger.writer_file.charset=UTF-8
qingzhou-logger.writer_file.convert=gzip

